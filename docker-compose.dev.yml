# Local development backing services for trustlist-core.
#
# Brings up the canonical store, the time-series store and the event bus so the
# foundation can be built and smoke-tested without a cloud account. This file is
# an addition beyond the literal Stage 0 PRD §7d scope — see
# docs/local-development.md for the rationale.
#
# Usage: docker compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:16
    container_name: trustlist-dev-postgres
    environment:
      POSTGRES_USER: trustlist
      POSTGRES_PASSWORD: trustlist-dev
      POSTGRES_DB: trustlist
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustlist"]
      interval: 5s
      timeout: 5s
      retries: 10

  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: trustlist-dev-timescaledb
    environment:
      POSTGRES_USER: trustlist
      POSTGRES_PASSWORD: trustlist-dev
      POSTGRES_DB: trustlist_timeseries
    ports:
      - "5433:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustlist"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: trustlist-dev-redpanda
    command:
      - redpanda
      - start
      - --mode dev-container
      - --smp 1
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
    ports:
      - "19092:19092"   # Kafka API
      - "18081:18081"   # Schema Registry
      - "18082:18082"   # HTTP Proxy
      - "9644:9644"     # Admin API
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  timescaledb-data:
  redpanda-data:
