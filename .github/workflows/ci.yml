name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check .

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run mypy

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest -m "not integration"

  integration-tests:
    runs-on: ubuntu-latest
    # Integration tests run against a real, ephemeral Postgres — no mocks
    # (Stage 0 PRD §7a). The data-model suite (Stage 0 issue 12) is wired here;
    # the event-bus suites (issues 11, 13) add a RedPanda service later.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: trustlist
          POSTGRES_PASSWORD: trustlist-dev
          POSTGRES_DB: trustlist
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trustlist"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TRUSTLIST_DB_URL: postgresql+psycopg://trustlist:trustlist-dev@localhost:5432/trustlist
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Apply canonical-store migrations
        working-directory: data-model
        run: uv run alembic upgrade head
      - name: Run integration tests
        run: uv run pytest -m integration

  licence-header:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python ci/check_license_headers.py

  secret-leak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # The gitleaks binary is MIT-licensed and needs no key; only the
      # gitleaks-action wrapper requires a licence for GitHub organisations.
      # Installed from the latest release rather than `go install`, whose
      # module path does not match the gitleaks go.mod declaration.
      - name: Install gitleaks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo gitleaks/gitleaks \
            --pattern '*linux_x64.tar.gz' --dir /tmp/gl
          tar -xzf /tmp/gl/*.tar.gz -C /tmp/gl gitleaks
          sudo install /tmp/gl/gitleaks /usr/local/bin/gitleaks
      - name: Scan for committed secrets
        run: gitleaks detect --source . --redact --exit-code 1

  reproducibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest tests/test_reproducibility.py

  commit-lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: webiny/action-conventional-commits@v1.3.0
