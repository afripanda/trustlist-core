name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check .

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run mypy

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest -m "not integration"

  integration-tests:
    runs-on: ubuntu-latest
    # Integration tests run against real, ephemeral backing services — no
    # mocks (Stage 0 PRD §7a / §7b). The data-model suite (Stage 0 issue 12)
    # exercises Postgres; the event-bus SDK suite (issue 13) exercises a real
    # RedPanda and its built-in schema registry (ADR-0011).
    #
    # The job runs *inside a container* so it shares the Docker network with
    # the service containers: each service is then reachable by its service
    # label as a hostname (`postgres`, `redpanda`). This is what lets RedPanda
    # advertise a resolvable broker address — its `ENABLE_DEFAULT_LISTENERS`
    # mode advertises the `redpanda` service alias, which a host-with-port-
    # mapping client could not reach.
    container:
      image: python:3.12-slim
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: trustlist
          POSTGRES_PASSWORD: trustlist-dev
          POSTGRES_DB: trustlist
        options: >-
          --health-cmd "pg_isready -U trustlist"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redpanda:
        image: redpandadata/redpanda:v24.2.7
        # ENABLE_DEFAULT_LISTENERS makes the stock image start RedPanda with
        # auto-configured listeners (no command override, which a GitHub
        # Actions `services:` block cannot supply). INTERNAL pins the
        # advertised broker hostname to the `redpanda` service alias so the
        # job container can resolve it. The built-in schema registry comes up
        # alongside on the standard port 8081.
        env:
          ENABLE_DEFAULT_LISTENERS: "true"
          INTERNAL: redpanda
        options: >-
          --health-cmd "rpk cluster health | grep -q 'Healthy:.*true'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    env:
      # Connection details reach the SDK and the migrations through the
      # environment only — never hard-coded (PRD §7b / §7g). Inside the job
      # container the services are addressed by their service label.
      TRUSTLIST_DB_URL: postgresql+psycopg://trustlist:trustlist-dev@postgres:5432/trustlist
      TRUSTLIST_EVENT_BUS_BROKERS: redpanda:9092
      TRUSTLIST_SCHEMA_REGISTRY_URL: http://redpanda:8081
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Apply canonical-store migrations
        working-directory: data-model
        run: uv run alembic upgrade head
      - name: Run integration tests
        run: uv run pytest -m integration

  # --- TypeScript event-bus SDK (Stage 0 issue 14) -------------------------
  # The TypeScript SDK lives in event-bus-sdk/typescript/ and is wire-compatible
  # with the Python SDK. These jobs are additional to the eight Python gates;
  # branch protection's required-status-checks list still names only the Python
  # jobs, so the TS jobs run and are visible on every PR but are not yet
  # "required" — the required list is extended separately by the technical lead.

  typescript-checks:
    # Lint, type-check, payload-type-drift check, build and unit tests for the
    # TypeScript SDK. No broker needed — the unit suite is broker-free.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: event-bus-sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: event-bus-sdk/typescript/package-lock.json
      - run: npm ci
      - name: Check generated payload types are in sync with event-schema/
        # Issue 14: payload types are generated from the event-schema/ JSON
        # Schemas and checked into the repo. Regenerate and fail if the
        # committed output drifts from what the current schemas produce.
        run: |
          npm run generate-types
          git diff --exit-code src/generated
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build
      - run: npm run test:unit

  typescript-integration:
    # The TypeScript SDK integration suite runs a real produce -> consume
    # round-trip against a real RedPanda — no mocks (Stage 0 PRD §7a / §7b) —
    # and a cross-language wire-interoperability test (a Python-produced wire
    # envelope consumed by the TypeScript consumer).
    #
    # The job runs *inside a container* so it shares the Docker network with
    # the RedPanda service container, reachable by its service label (mirrors
    # the Python integration-tests job).
    runs-on: ubuntu-latest
    container:
      image: node:22-bookworm-slim
    services:
      redpanda:
        image: redpandadata/redpanda:v24.2.7
        # ENABLE_DEFAULT_LISTENERS / INTERNAL pin the advertised broker
        # hostname to the `redpanda` service alias so the job container can
        # resolve it; the built-in schema registry comes up on port 8081.
        env:
          ENABLE_DEFAULT_LISTENERS: "true"
          INTERNAL: redpanda
        options: >-
          --health-cmd "rpk cluster health | grep -q 'Healthy:.*true'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: event-bus-sdk/typescript
    env:
      # Connection details reach the SDK through the environment only — never
      # hard-coded (PRD §7b / §7g). Inside the job container the RedPanda
      # service is addressed by its service label.
      TRUSTLIST_EVENT_BUS_BROKERS: redpanda:9092
      TRUSTLIST_SCHEMA_REGISTRY_URL: http://redpanda:8081
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: event-bus-sdk/typescript/package-lock.json
      - run: npm ci
      - run: npm run test:integration

  licence-header:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python ci/check_license_headers.py

  secret-leak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # The gitleaks binary is MIT-licensed and needs no key; only the
      # gitleaks-action wrapper requires a licence for GitHub organisations.
      # Installed from the latest release rather than `go install`, whose
      # module path does not match the gitleaks go.mod declaration.
      - name: Install gitleaks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo gitleaks/gitleaks \
            --pattern '*linux_x64.tar.gz' --dir /tmp/gl
          tar -xzf /tmp/gl/*.tar.gz -C /tmp/gl gitleaks
          sudo install /tmp/gl/gitleaks /usr/local/bin/gitleaks
      - name: Scan for committed secrets
        run: gitleaks detect --source . --redact --exit-code 1

  reproducibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest tests/test_reproducibility.py

  commit-lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: webiny/action-conventional-commits@v1.3.0
